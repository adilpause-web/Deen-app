<!DOCTYPE html>

  button:focus-visible{outline:2px solid #E8C874;outline-offset:2px;}

<script>

  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch(()=>{});
  });
}
</script>
